[build]
builder = "DOCKERFILE"
dockerfilePath = "/docker/api.railway.Dockerfile"
watchPatterns = [
  "/apps/api/app/**",
  "/apps/api/pyproject.toml",
  "/apps/api/uv.lock",
  "/docker/api.railway.Dockerfile",
  "/railway.api.toml",
]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
