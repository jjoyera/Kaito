project:
  name: kaito
  language: mixed
  artifact_store: both
  working_branch: feature/project-scaffolding
  documentation_language: es
  technical_artifact_language: en
  summary: >-
    Kaito is an AI coach web application for ultradistance runners. It uses
    onboarding, training knowledge, Strava-derived activity data, and adaptive
    plan recalculation to support trail, backyard ultra, and OCR goals.

sdd:
  mode: interactive
  strict_tdd: true
  strict_tdd_reason: >-
    Concrete unit, integration, and E2E runners are configured and exercised
    by CI, so implementation changes must follow RED-GREEN-REFACTOR.
  artifact_store: both
  persistence_mode: hybrid
  chained_pr_strategy: single-pr-default
  review_budget_changed_lines: 2500
  delivery_constraints:
      issue_21:
        authored_changed_lines_per_pr: "<=2500"
        precedence: >-
          Maintainer-approved current Issue #21 PR 2 cap. Historical PR 1
          retains its former 400-line evidence; it is not a current constraint.
      issue_22:
        authored_changed_lines_per_pr: "<=4500"
        precedence: >-
          Maintainer-approved size:exception for Issue #22 PR 1
          (feat/onboarding-ui-22-pr1), granted 2026-07-15. The change's own
          proposal.md forecast (900-1,400 lines) undercounted the domain
          validation layer, its tests, the unplanned CORS/access-token
          prerequisites, and full E2E coverage. Actual authored total: ~4,335
          lines (source ~2,021, unit tests ~965, E2E ~416, OpenSpec SDD docs
          ~608, styles/config ~325). Approved as a single PR rather than
          split because the domain, component, and use-case layers are
          tightly interdependent and were already built and verified
          together; splitting after the fact would not reduce reviewable
          risk, only diff count.
  phase_rules:
    init:
      allowed_outputs:
        - openspec project context/config
        - change skeleton and artifact references
      disallowed_outputs:
        - implementation scaffolding
        - proposal/spec/design/tasks/apply execution
    proposal:
      requires_user_approval: true
    spec:
      requires_approved_proposal: true
    design:
      requires_approved_proposal: true
    tasks:
      requires_approved_design_or_spec: true
    apply:
      requires_approved_tasks: true
      requires_tests_when_runner_exists: true
    sync:
      requires_verify_pass: true
      requires_root_readme_review: true
      root_readme_update_when:
        - completed work changes project capabilities
        - completed work changes setup or environment variables
        - completed work changes architecture or runtime behavior
        - completed work changes developer commands or verification flow
      root_readme_guidance: >-
        Keep the root README concise: summarize stable project-level changes
        and point to package-specific documentation instead of duplicating full
        specs.

testing:
  status: operational
  strict_tdd_supported: true
  detected_runners:
    - Node.js test runner via tsx
    - pytest
    - eslint
    - next build
    - Playwright E2E (Chromium development and production checks)
    - ruff
    - FastAPI TestClient
    - local Supabase RLS integration test
  commands:
    - pnpm test:portable-paths
    - pnpm test:web-sentry-scrubbing
    - pnpm test:web-auth
    - pnpm lint:web
    - pnpm build:web
    - pnpm test:web-e2e
    - cd apps/api && uv run ruff check .
    - cd apps/api && uv run pytest tests/ --ignore=tests/integration
    - npx supabase@2.39.2 start && npx supabase@2.39.2 db reset --local && cd apps/api && uv run pytest tests/integration/test_onboarding_rls.py -q
  layers:
    unit: Node.js test runner via tsx and pytest
    integration: FastAPI TestClient, SQLAlchemy tests, and local Supabase RLS proof
    e2e: Playwright Chromium against development and production Next.js servers
  coverage:
    available: false
    command: null
  quality:
    linter: pnpm lint:web and cd apps/api && uv run ruff check .
    type_checker: pnpm build:web; pyright config exists but no executable is configured
    formatter: not configured
  local_preflight:
    node: v22.22.2 (does not satisfy the declared >=24.18 <25 range)
    pnpm: 11.0.0 via corepack; direct pnpm command is unavailable
    uv: 0.9.24
  notes: >-
    CI runs deterministic web contract tests, Chromium E2E checks, API tests,
    and a Docker-backed local Supabase RLS integration proof. No coverage
    reporter or threshold is configured.

architecture:
  planned_repo_shape: monorepo
  planned_apps:
    web: Next.js
    api: FastAPI
  planned_database: Supabase PostgreSQL
  planned_auth: Supabase Auth
  planned_backend_persistence: SQLAlchemy + Alembic
  source_docs:
    - README.md
    - docs/00-product-vision.md
    - docs/04-functional-requirements.md
    - docs/05-data-model.md
    - docs/06-ai-behavior.md
    - docs/08-architecture.md

conventions:
  branches: english-lowercase-hyphenated
  commits: conventional-commits-in-english
  docs: >-
    Spanish TFM docs; English technical artifacts unless extending Spanish docs
  documentation_paths:
    require_repository_relative_paths: true
    forbid_personal_absolute_paths: true
    rule: >-
      Repository documentation and SDD artifacts MUST use paths relative to the
      repository root. Personal home directories, usernames, workstation names,
      and machine-specific absolute paths MUST NOT be written to tracked files.
    verification: >-
      Before committing documentation, search changed text for common home-directory
      prefixes and local identity fragments; any match blocks the commit until replaced.
  frontend:
    architecture: screaming-by-real-capability
    app_directory: nextjs-routing-and-orchestration-only
    feature_root: apps/web/features/<capability>
    auth_scopes:
      - _components
      - _adapters
      - _use-cases
      - _infrastructure
      - _domain-when-pure-rules-warrant-it
    container_policy: genuine-multi-concern-orchestration-only
    shared_promotion_minimum_distinct_real_features: 2
    same_feature_runtime_consumers_count_as_distinct_features: false
    current_supabase_owner: apps/web/features/auth/_infrastructure/supabase
    current_authenticated_fetch_owner: apps/web/features/auth/_adapters
    forbid_speculative_shared_abstractions: true
    forbid_empty_future_feature_folders: true
    forbid_generic_utils_helpers: true
