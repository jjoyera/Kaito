---
# Local-only developer convenience for Kaito.
# Not deployment, CD, or production configuration.
services:
  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_TELEMETRY_DISABLED: "1"

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    ports:
      - "8000:8000"
