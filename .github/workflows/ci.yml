---
name: CI

permissions:
  contents: read

"on":
  pull_request:
  push:
    branches:
      - main

jobs:
  web:
    name: Web scaffold validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "24.18"

      - name: Test non-portable path checker
        run: node --test scripts/check-portable-paths.test.mjs

      - name: Check for non-portable paths
        run: node scripts/check-portable-paths.mjs

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          version: "11.0.0"
          run_install: false

      - name: Install web dependencies
        run: pnpm install

      - name: Lint web scaffold
        run: pnpm lint:web

      - name: Test Sentry privacy scrubber
        run: pnpm test:web-sentry-scrubbing

      - name: Test web auth contracts
        run: pnpm test:web-auth

      - name: Build web scaffold
        run: pnpm build:web

      - name: Build Docker web image
        run: pnpm test:web-docker-build

      - name: Install Playwright Chromium
        run: pnpm --filter web exec playwright install --with-deps chromium

      - name: Run Playwright web smoke check
        run: pnpm test:web-e2e

  api:
    name: API scaffold validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e

      - name: Set up Node for pinned Supabase CLI
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "24.18"

      - name: Install API dependencies
        working-directory: apps/api
        run: uv sync --frozen

      - name: Lint API scaffold
        working-directory: apps/api
        run: uv run ruff check .

      - name: Run API tests
        working-directory: apps/api
        run: uv run pytest tests/ --ignore=tests/integration

      - name: Prove onboarding RLS with local Supabase
        run: >-
          npx supabase@2.39.2 start >/dev/null &&
          npx supabase@2.39.2 db reset --local >/dev/null &&
          (cd apps/api && uv run pytest tests/integration/test_onboarding_rls.py -q)

      - name: Stop local Supabase
        if: always()
        run: npx supabase@2.39.2 stop --no-backup >/dev/null

      - name: Smoke-load FastAPI app
        working-directory: apps/api
        run: uv run python -c "from app.main import app; print(app.title)"

      - name: Validate health contract
        working-directory: apps/api
        run: >-
          uv run python -c "from fastapi.testclient import TestClient;
          from app.main import app;
          response = TestClient(app).get('/health');
          assert response.status_code == 200;
          assert response.json() == {'status': 'ok'}"
