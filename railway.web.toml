[build]
builder = "DOCKERFILE"
dockerfilePath = "/docker/web.railway.Dockerfile"
watchPatterns = [
  "/apps/web/**",
  "/packages/api-client/**",
  "/package.json",
  "/pnpm-lock.yaml",
  "/pnpm-workspace.yaml",
  "/docker/web.railway.Dockerfile",
  "/railway.web.toml",
]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
